# ============================================
# 系统配置文件 - ArkEPass
# ============================================
# 版本：硬件版本（0.2、0.3、0.5、0.6）
# 屏幕：显示类型（hsd、boe、laowu）
# ============================================

# ---------- 屏幕型号对照表 ----------
# ID     名称
# ------  ------------
# hsd     HSD 瀚彩屏
# boe     BOE 京东方屏
# laowu   老五屏

# ============================================
# 硬件版本配置
# 可选值：0.2, 0.3, 0.5, 0.6
# ============================================
device_rev=0.6

# ============================================
# 屏幕类型配置
# 可选值：hsd, boe, laowu
# ============================================
screen=hsd

# ============================================
# 接口功能配置
# 可选值：i2c0, uart1, uart2, spi1, i2s0_pa, i2s0_pe, adc_pa1, adc_pa123, usbhost, usbhs
# 多个功能用空格分隔
# ============================================
interface=

# ============================================
# 扩展功能配置
# 可选值：cardkb, es8311_sound, lsm6ds3_pre0.4
# 多个功能用空格分隔
# ============================================
ext=

# ============================================
# 内核文件名（不要修改）
# ============================================
kernelfn=zImage
